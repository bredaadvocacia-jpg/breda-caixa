<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Releitura da logo Breda · símbolo: coluna jônica + B estilizado -->
  <defs>
    <linearGradient id="brdaBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a6b22"/>
      <stop offset="100%" stop-color="#6b5118"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="10" fill="url(#brdaBg)"/>
  <g fill="#f5efe1" stroke="none">
    <!-- Capitel (linha horizontal superior) -->
    <rect x="28" y="28" width="64" height="7" rx="1.5"/>
    <!-- B — semicírculo superior -->
    <path d="M 56 35
             L 56 60
             L 71 60
             A 12.5 12.5 0 0 0 71 35
             Z
             M 64 42
             L 71 42
             A 5.5 5.5 0 0 1 71 53
             L 64 53
             Z" fill-rule="evenodd"/>
    <!-- B — semicírculo inferior -->
    <path d="M 56 60
             L 56 88
             L 73 88
             A 14 14 0 0 0 73 60
             Z
             M 64 67
             L 73 67
             A 7 7 0 0 1 73 81
             L 64 81
             Z" fill-rule="evenodd"/>
    <!-- 3 colunas verticais (fuste) -->
    <rect x="30" y="38" width="6" height="50" rx="1"/>
    <rect x="40" y="38" width="6" height="50" rx="1"/>
    <rect x="50" y="38" width="6" height="50" rx="1"/>
    <!-- Base (linha horizontal inferior) -->
    <rect x="28" y="88" width="32" height="7" rx="1.5"/>
  </g>
</svg>
