<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Marca Breda Advocacia · coluna/capitel em "B" sobre quadrado dourado -->
  <rect width="120" height="120" rx="16" fill="#8a6f1f"/>
  <g fill="#ffffff">
    <!-- capitel / topo curvo (meia-volta estilo B) -->
    <path d="M38 24 h22 a19 19 0 0 1 0 38 H38 Z M50 36 h10 a7 7 0 0 1 0 14 h-10 Z" fill-rule="evenodd"/>
    <!-- ábaco (linha do capitel) -->
    <rect x="28" y="59" width="64" height="7" rx="3.5"/>
    <!-- fuste: flautas da coluna -->
    <rect x="36" y="70" width="8" height="24" rx="2.5"/>
    <rect x="48" y="70" width="8" height="24" rx="2.5"/>
    <rect x="60" y="70" width="8" height="24" rx="2.5"/>
    <rect x="72" y="70" width="8" height="24" rx="2.5"/>
    <!-- base -->
    <rect x="30" y="97" width="60" height="7" rx="3.5"/>
  </g>
</svg>
