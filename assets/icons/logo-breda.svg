<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Logo Breda — versão completa: símbolo + tipografia + subtítulo -->
  <defs>
    <linearGradient id="brdaBg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a6b22"/>
      <stop offset="100%" stop-color="#6b5118"/>
    </linearGradient>
  </defs>

  <!-- Símbolo (centralizado horizontalmente) -->
  <g transform="translate(180 20)">
    <rect width="120" height="120" rx="10" fill="url(#brdaBg2)"/>
    <g fill="#f5efe1" stroke="none">
      <rect x="28" y="28" width="64" height="7" rx="1.5"/>
      <path d="M 56 35 L 56 60 L 71 60 A 12.5 12.5 0 0 0 71 35 Z M 64 42 L 71 42 A 5.5 5.5 0 0 1 71 53 L 64 53 Z" fill-rule="evenodd"/>
      <path d="M 56 60 L 56 88 L 73 88 A 14 14 0 0 0 73 60 Z M 64 67 L 73 67 A 7 7 0 0 1 73 81 L 64 81 Z" fill-rule="evenodd"/>
      <rect x="30" y="38" width="6" height="50" rx="1"/>
      <rect x="40" y="38" width="6" height="50" rx="1"/>
      <rect x="50" y="38" width="6" height="50" rx="1"/>
      <rect x="28" y="88" width="32" height="7" rx="1.5"/>
    </g>
  </g>

  <!-- Texto "BREDA" — sans-serif extra-bold condensado -->
  <text x="240" y="240" text-anchor="middle"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="92" font-weight="900" fill="#2a2920"
        letter-spacing="2"
        textLength="280" lengthAdjust="spacingAndGlyphs">BREDA</text>

  <!-- Subtítulo "SOCIEDADE DE ADVOGADOS" -->
  <text x="240" y="290" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="14" font-weight="600"
        fill="#3a3830" letter-spacing="6">SOCIEDADE DE ADVOGADOS</text>
</svg>
