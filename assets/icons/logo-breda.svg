<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap');
    </style>
  </defs>
  <!-- Logo Breda Advocacia · versão completa · grid 24px · sem gradiente -->

  <!-- MARK · centralizado no topo -->
  <g transform="translate(240 32)">
    <rect width="120" height="120" rx="4" fill="#7c5e1e"/>
    <g fill="#f8f3e3" fill-rule="evenodd">
      <rect x="30" y="32" width="60" height="4" rx="0.5"/>
      <path d="M 58 38 L 58 60 L 70 60 A 11 11 0 0 0 70 38 Z M 64 44 L 70 44 A 5 5 0 0 1 70 54 L 64 54 Z"/>
      <path d="M 58 60 L 58 84 L 72 84 A 12 12 0 0 0 72 60 Z M 64 66 L 72 66 A 6 6 0 0 1 72 78 L 64 78 Z"/>
      <rect x="32" y="40" width="4" height="44" rx="0.5"/>
      <rect x="41" y="40" width="4" height="44" rx="0.5"/>
      <rect x="50" y="40" width="4" height="44" rx="0.5"/>
      <rect x="30" y="84" width="28" height="4" rx="0.5"/>
    </g>
  </g>

  <!-- WORDMARK · "BREDA" em serif display (Cormorant Garamond) -->
  <text x="300" y="290"
        text-anchor="middle"
        font-family="'Cormorant Garamond', 'Playfair Display', 'Times New Roman', serif"
        font-size="86"
        font-weight="600"
        fill="#2a2920"
        letter-spacing="14">BREDA</text>

  <!-- Linha divisora fina dourada -->
  <line x1="265" y1="320" x2="335" y2="320"
        stroke="#7c5e1e" stroke-width="1" stroke-linecap="round"/>

  <!-- SUBTÍTULO · sans-serif light com tracking aberto -->
  <text x="300" y="355"
        text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif"
        font-size="13"
        font-weight="500"
        fill="#6b665a"
        letter-spacing="6">SOCIEDADE DE ADVOGADOS</text>
</svg>
