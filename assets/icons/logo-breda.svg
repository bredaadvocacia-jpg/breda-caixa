<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Inter:wght@500;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- MARK · grande, dominante (180×180) -->
  <g transform="translate(270 30)">
    <rect width="180" height="180" rx="6" fill="#7c5e1e"/>
    <g fill="#f8f3e3" fill-rule="evenodd" transform="scale(1.5)">
      <rect x="30" y="32" width="60" height="4" rx="0.5"/>
      <path d="M 58 38 L 58 60 L 70 60 A 11 11 0 0 0 70 38 Z M 64 44 L 70 44 A 5 5 0 0 1 70 54 L 64 54 Z"/>
      <path d="M 58 60 L 58 84 L 72 84 A 12 12 0 0 0 72 60 Z M 64 66 L 72 66 A 6 6 0 0 1 72 78 L 64 78 Z"/>
      <rect x="32" y="40" width="4" height="44" rx="0.5"/>
      <rect x="41" y="40" width="4" height="44" rx="0.5"/>
      <rect x="50" y="40" width="4" height="44" rx="0.5"/>
      <rect x="30" y="84" width="28" height="4" rx="0.5"/>
    </g>
  </g>

  <!-- WORDMARK · BREDA em Playfair Display Black (peso 900, alto contraste editorial) -->
  <text x="360" y="385"
        text-anchor="middle"
        font-family="'Playfair Display', 'Cormorant Garamond', 'Times New Roman', serif"
        font-size="130"
        font-weight="900"
        fill="#1f1e18"
        letter-spacing="6">BREDA</text>

  <!-- Filete dourado mais largo (detalhe premium, divisor manifesto) -->
  <line x1="280" y1="425" x2="440" y2="425"
        stroke="#7c5e1e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- SUBTÍTULO · com mais presença (peso 600) -->
  <text x="360" y="468"
        text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif"
        font-size="17"
        font-weight="600"
        fill="#3a3830"
        letter-spacing="9">SOCIEDADE DE ADVOGADOS</text>

  <!-- Marca discreta de "estabelecido" pra dar peso institucional (opcional) -->
  <text x="360" y="510"
        text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif"
        font-size="11"
        font-weight="500"
        fill="#9b958a"
        letter-spacing="4">CUIABÁ · MATO GROSSO</text>
</svg>
